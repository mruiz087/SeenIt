<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeenIt - Seguimiento de Series y Películas</title>
    <meta name="description" content="App privada para seguimiento de series y películas">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-white min-h-screen antialiased">

    <div id="app" class="flex flex-col min-h-screen bg-black">

        <main class="tvst-main">

            <!-- SERIES -->
            <div id="content-series" class="tab-content">
                <nav class="tvst-subnav" aria-label="Series">
                    <button type="button" onclick="switchSubTab('pending-list')" id="series-subtab-pending-list" class="tvst-subnav-tab is-active">Lista Pendiente</button>
                    <button type="button" onclick="switchSubTab('upcoming')" id="series-subtab-upcoming" class="tvst-subnav-tab">Próximamente</button>
                </nav>
                <div class="tvst-continue-bar" id="series-continue-bar">
                    <button type="button" class="tvst-continue-btn" onclick="scrollToNowAnchor()">Ver a continuación</button>
                    <button type="button" class="tvst-grid-toggle" aria-label="Vista" tabindex="-1">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    </button>
                </div>
                <div id="subtab-content-pending-list" class="tvst-tab-panel">
                    <div id="pending-list-container" class="tvst-episode-list">
                        <div class="tvst-empty"><div class="tvst-empty-icon">📺</div><p>Cargando episodios...</p></div>
                    </div>
                </div>
                <div id="subtab-content-upcoming" class="tvst-tab-panel hidden">
                    <div id="upcoming-list-container" class="tvst-episode-list">
                        <div class="tvst-empty"><div class="tvst-empty-icon">🗓️</div><p>Cargando próximos...</p></div>
                    </div>
                </div>
            </div>

            <!-- PELÍCULAS -->
            <div id="content-movies" class="tab-content hidden">
                <nav class="tvst-subnav" aria-label="Películas">
                    <button type="button" onclick="switchMoviesSubTab('pending-list')" id="movies-subtab-pending-list" class="tvst-subnav-tab is-active">Lista Pendiente</button>
                    <button type="button" onclick="switchMoviesSubTab('upcoming')" id="movies-subtab-upcoming" class="tvst-subnav-tab">Próximamente</button>
                </nav>
                <div class="tvst-continue-bar">
                    <button type="button" class="tvst-continue-btn" onclick="switchMoviesSubTab('pending-list')">Ver a continuación</button>
                    <button type="button" class="tvst-grid-toggle" aria-label="Vista" tabindex="-1">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    </button>
                </div>
                <div id="movies-subtab-content-pending-list" class="tvst-tab-panel">
                    <div id="movies-pending-list-container" class="tvst-poster-grid">
                        <div class="tvst-empty" style="grid-column:1/-1"><div class="tvst-empty-icon">🎬</div><p>Cargando películas...</p></div>
                    </div>
                </div>
                <div id="movies-subtab-content-upcoming" class="tvst-tab-panel hidden">
                    <div id="movies-upcoming-list-container">
                        <div class="tvst-empty"><div class="tvst-empty-icon">🗓️</div><p>Cargando estrenos...</p></div>
                    </div>
                </div>
            </div>

            <!-- EXPLORAR -->
            <div id="content-explore" class="tab-content hidden">
                <div class="py-4">
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="Buscar series o películas..." class="tvst-search" onkeyup="handleSearch(event)">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
                        </span>
                    </div>
                </div>
                <div id="search-results" class="tvst-search-list">
                    <div class="tvst-empty"><p>Escribe al menos 2 caracteres</p></div>
                </div>
            </div>

            <!-- PERFIL -->
            <div id="content-profile" class="tab-content hidden">
                <nav class="tvst-profile-tabs">
                    <button type="button" onclick="switchProfileTab('series')" id="profile-tab-series" class="tvst-profile-tab is-active">Series</button>
                    <button type="button" onclick="switchProfileTab('movies')" id="profile-tab-movies" class="tvst-profile-tab">Películas</button>
                </nav>

                <div id="profile-series-content">
                    <div class="tvst-profile-toolbar">
                        <select id="profile-series-filter" onchange="renderProfileView()" class="tvst-profile-filter">
                            <option value="all">Todas</option>
                            <option value="pending">Pendiente</option>
                            <option value="watching">Viendo</option>
                            <option value="standby">Ver en otro momento</option>
                            <option value="completed">Completada</option>
                            <option value="dropped">Abandonada</option>
                        </select>
                        <button type="button" id="profile-series-more" class="tvst-show-more-btn" onclick="toggleProfileExpanded('series')">Mostrar más</button>
                    </div>
                    <div id="profile-series-container" class="tvst-profile-rail"></div>
                </div>

                <div id="profile-movies-content" class="hidden">
                    <div class="tvst-profile-toolbar">
                        <select id="profile-movies-filter" onchange="renderProfileView()" class="tvst-profile-filter">
                            <option value="all">Todas</option>
                            <option value="pending">Pendiente</option>
                            <option value="completed">Vista</option>
                        </select>
                        <button type="button" id="profile-movies-more" class="tvst-show-more-btn" onclick="toggleProfileExpanded('movies')">Mostrar más</button>
                    </div>
                    <div id="profile-movies-container" class="tvst-profile-rail"></div>
                </div>

                <div id="profile-settings-section" class="mt-4 space-y-3 pb-8">
                    <h2 class="text-xs font-bold uppercase tracking-wide text-gray-400 px-1">Ajustes</h2>
                    <div class="tvst-section-card">
                        <h3 class="font-bold mb-2 text-sm">Google Drive</h3>
                        <p id="drive-status" class="text-sm text-gray-400 mb-2">Cargando...</p>
                        <p id="drive-origin-hint" class="text-xs text-gray-600 mb-4"></p>
                        <div class="flex flex-wrap gap-2">
                            <button type="button" id="btn-connect-drive" onclick="connectDrive()" class="px-4 py-2 bg-white text-black rounded-lg text-sm font-semibold">Conectar Drive</button>
                            <button type="button" id="btn-disconnect-drive" onclick="disconnectDrive()" class="hidden px-4 py-2 bg-zinc-800 text-white rounded-lg text-sm font-semibold">Desconectar</button>
                            <button type="button" id="btn-sync-drive" onclick="loadFromDrive()" class="hidden px-4 py-2 bg-zinc-800 text-white rounded-lg text-sm font-semibold">Sincronizar</button>
                        </div>
                    </div>
                    <div class="tvst-section-card">
                        <h3 class="font-bold mb-2 text-sm">Backup</h3>
                        <div class="flex flex-wrap gap-2">
                            <button type="button" onclick="exportData()" class="px-4 py-2 bg-zinc-800 text-white rounded-lg text-sm">Exportar</button>
                            <button type="button" onclick="importData()" class="px-4 py-2 bg-zinc-800 text-white rounded-lg text-sm">Importar</button>
                            <button type="button" onclick="clearAllData()" class="px-4 py-2 bg-red-900 text-red-100 rounded-lg text-sm">Borrar todo</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="tvst-bottom-nav" aria-label="Principal">
            <button type="button" onclick="switchTab('series')" class="tvst-bottom-nav-btn is-active" data-tab="series">
                <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="1.5"/><path d="M8 3l4 3 4-3"/><path d="M8 11h8M8 15h5"/></svg>
                <span>Series</span>
            </button>
            <button type="button" onclick="switchTab('movies')" class="tvst-bottom-nav-btn" data-tab="movies">
                <svg viewBox="0 0 24 24"><path d="M4 6h12l4-2v16l-4-2H4a1 1 0 01-1-1V7a1 1 0 011-1z"/><path d="M16 6l4-2M16 18l4 2M7 10l2 1.5L7 13M7 14l2 1.5"/></svg>
                <span>Películas</span>
            </button>
            <button type="button" onclick="switchTab('explore')" class="tvst-bottom-nav-btn" data-tab="explore">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
                <span>Explorar</span>
            </button>
            <button type="button" onclick="switchTab('profile')" class="tvst-bottom-nav-btn" data-tab="profile">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c1.5-3.5 4-5 7-5s5.5 1.5 7 5"/></svg>
                <span>Perfil</span>
            </button>
        </nav>
    </div>

    <!-- Modal detalle estilo TVST -->
    <div id="detail-modal" class="tvst-modal hidden">
        <div class="tvst-modal-backdrop" onclick="closeDetailMenu(); closeModal()"></div>
        <div class="tvst-modal-sheet">
            <div class="tvst-modal-scroll">
                <header id="modal-hero" class="tvst-detail-hero">
                    <button type="button" class="tvst-hero-close" onclick="closeModal()" aria-label="Cerrar">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                    <button type="button" class="tvst-hero-menu" onclick="toggleDetailMenu(event)" aria-label="Opciones">⋯</button>
                    <div id="detail-overflow-menu" class="tvst-overflow-menu hidden" role="menu"></div>
                    <div class="tvst-hero-fade"></div>
                    <div class="tvst-hero-footer">
                        <div class="tvst-hero-text">
                            <div class="tvst-hero-title-row">
                                <h2 id="modal-title" class="tvst-hero-title">Título</h2>
                                <div id="modal-hero-progress-label" class="tvst-hero-pct">0%</div>
                            </div>
                            <div class="tvst-hero-progress-track">
                                <div id="modal-hero-progress" class="tvst-hero-progress-fill" style="width:0%"></div>
                            </div>
                            <p id="modal-hero-meta" class="tvst-hero-meta"></p>
                        </div>
                    </div>
                </header>

                <div id="detail-tabs" class="tvst-detail-tabs hidden">
                    <button type="button" id="detail-info-tab" onclick="switchDetailTab('info')" class="tvst-detail-tab is-active">Información</button>
                    <button type="button" id="detail-episodes-tab" onclick="switchDetailTab('episodes')" class="tvst-detail-tab">Episodios</button>
                </div>

                <div class="tvst-modal-body">
                    <div id="detail-info-panel"></div>
                    <div id="modal-episodes" class="hidden">
                        <div id="episodes-list"></div>
                    </div>

                    <!-- Hidden legacy nodes kept for JS compatibility -->
                    <div id="modal-poster" class="hidden"></div>
                    <div id="modal-meta" class="hidden"></div>
                    <p id="modal-overview" class="hidden"></p>
                    <div id="modal-watch-providers" class="hidden"></div>
                    <div id="modal-rating" class="hidden"></div>
                    <input type="hidden" id="modal-rating-input" value="0">
                    <select id="modal-status" class="hidden"><option value="pending">Pendiente</option></select>
                </div>
            </div>
        </div>
        <div id="modal-add-bar" class="tvst-modal-add-bar hidden">
            <button type="button" id="modal-add-btn" class="tvst-modal-add-btn" onclick="addFromDetail()">+ Añadir</button>
        </div>
    </div>

    <div id="loading-overlay" class="fixed inset-0 z-[60] bg-black/60 flex items-center justify-center hidden">
        <div class="bg-zinc-900 border border-zinc-700 rounded-xl p-6 flex flex-col items-center gap-3">
            <div class="w-10 h-10 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            <p class="text-sm text-gray-400">Cargando...</p>
        </div>
    </div>

    <div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 bg-zinc-800 text-white px-5 py-2.5 rounded-lg text-sm z-[60] hidden shadow-xl max-w-[90vw] text-center">
        <span id="toast-message">Mensaje</span>
    </div>

    <input type="file" id="import-file" accept=".json" class="hidden" onchange="handleImport(event)">

    <script src="tmdb-service.js"></script>
    <script src="drive-service.js"></script>
    <script src="config.js" onerror="console.warn('[Config] config.js no encontrado')"></script>
    <script src="app.js"></script>
    <script>
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => initApp());
        } else {
            initApp();
        }
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(console.error);
            });
        }
    </script>
</body>
</html>
