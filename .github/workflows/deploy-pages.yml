name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from secrets
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -z "$TMDB_API_KEY" ] || [ -z "$GOOGLE_CLIENT_ID" ] || [ -z "$GOOGLE_API_KEY" ]; then
            echo "::error::Faltan secrets: TMDB_API_KEY, GOOGLE_CLIENT_ID y/o GOOGLE_API_KEY"
            exit 1
          fi
          printf '%s\n' \
            "const CONFIG_TMDB_API_KEY = '${TMDB_API_KEY}';" \
            "const CONFIG_GOOGLE_CLIENT_ID = '${GOOGLE_CLIENT_ID}';" \
            "const CONFIG_GOOGLE_API_KEY = '${GOOGLE_API_KEY}';" \
            > config.js
          echo "config.js generado"

      - name: Prepare site artifact
        run: |
          mkdir -p site/icons
          cp index.html styles.css app.js drive-service.js tmdb-service.js tvtime-import.js \
             manifest.json sw.js config.js config.example.js site/
          cp icons/icon.svg icons/icon-192.png icons/icon-512.png \
             icons/icon-maskable-192.png icons/icon-maskable-512.png site/icons/
          # optional local server helper not required on Pages
          ls -la site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
